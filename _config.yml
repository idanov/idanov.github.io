name: Ivan Danov
description: Learn. Keep it simple. Dream big.
meta_description: "My Personal Blog, Blogging about science, technology, startups and my dreams."

aboutPage: true

markdown: kramdown
highlighter: rouge

gems: [jekyll-paginate]
paginate: 20
baseurl: /
domain_name: 'https://idanov.github.io/'
google_analytics: 'UA-71919301-1'
disqus: false
disqus_shortname: 'ivandanov'

# Details for the RSS feed generator
url:            'https://idanov.github.io/'
author:         'Ivan Danov'
authorTwitter:  'ivandanov'

permalink:       pretty

gems:
  - jemoji

defaults:
    -
        scope:
            path: "" # empty string for all files
            type: pages
        values:
            layout: default
    -
        scope:
            path: "" # empty string for all files
            type: posts
        values:
            layout: post
    -
        scope:
            path: ""
            type: drafts
        values:
            layout: post
